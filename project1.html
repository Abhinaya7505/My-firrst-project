<html>
<head>

<body onload="showProducts(1); renderCart();">
<div id="container">
  <header>
      <h1 style="text-align: center;">WELCOME TO MY PAGE!!!</h1>
  </header>
  <div class="navbar">
    <a href="#" onclick="showProducts(1); return false;">Appliances</a>
    <div class="dropdown">
      <button class="dropbtn">Clothes <i class="fa fa-caret-down"></i></button>
      <div class="dropdown-content">
        <a href="#" onclick="showProducts(2); return false;">Women's wear</a>
        <a href="#" onclick="showProducts(3); return false;">Men's wear</a>
      </div>
    </div>
    <a href="#" onclick="showProducts(4); return false;">Snacks</a>
    <a href="#" onclick="showProducts(5); return false;">Books</a>
  </div>
  <div class="main">
    <div class="myRow"></div>
  </div>
</div>
<!-- Shopping Cart Container -->
<div id="flexOutput"></div>
<!-- Bill/Checkout Container -->
<div id="finalBill"></div>
